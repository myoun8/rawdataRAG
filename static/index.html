<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NCNR Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #444;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 72%;
      line-height: 1.55;
      font-size: 14px;
      padding: 10px 14px;
      border-radius: 12px;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 3px;
    }

    .msg.assistant p { margin: 0 0 8px; }
    .msg.assistant p:last-child { margin-bottom: 0; }
    .msg.assistant code {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      background: #f0f0f0;
      padding: 1px 4px;
      border-radius: 3px;
    }
    .msg.assistant pre {
      background: #f0f0f0;
      padding: 10px 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 6px 0;
    }
    .msg.assistant pre code { background: none; padding: 0; }
    .msg.assistant ul, .msg.assistant ol { padding-left: 18px; margin: 4px 0; }

    .thinking {
      align-self: flex-start;
      display: flex;
      gap: 5px;
      padding: 10px 14px;
    }
    .thinking span {
      width: 7px; height: 7px;
      background: #bbb;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    #input-bar {
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
    }
    #user-input:focus { border-color: #1a73e8; }

    #send-btn {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
    }
    #send-btn:disabled { background: #aaa; cursor: default; }
    #send-btn:not(:disabled):hover { background: #1558b0; }
  </style>
</head>
<body>
  <header>NCNR Assistant</header>

  <div id="messages"></div>

  <div id="input-bar">
    <textarea id="user-input" placeholder="Ask about instruments, experiments, or documentation…" rows="1"></textarea>
    <button id="send-btn">Send</button>
  </div>

  <script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    const threadId = 'session_' + Math.random().toString(36).slice(2);

    function addMessage(role, html) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      if (role === 'assistant') {
        div.innerHTML = html;
      } else {
        div.textContent = html;
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function showThinking() {
      const el = document.createElement('div');
      el.className = 'thinking';
      el.innerHTML = '<span></span><span></span><span></span>';
      messages.appendChild(el);
      messages.scrollTop = messages.scrollHeight;
      return el;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;

      addMessage('user', text);
      const thinking = showThinking();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, thread_id: threadId }),
        });
        const data = await res.json();
        thinking.remove();
        addMessage('assistant', marked.parse(data.response ?? data.detail ?? 'No response.'));
      } catch (err) {
        thinking.remove();
        addMessage('assistant', '<em>Error reaching the server.</em>');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = input.scrollHeight + 'px';
    });
  </script>
</body>
</html>
